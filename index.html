<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="9x9 지뢰 10개 규칙의 지뢰찾기 게임" />
    <title>지뢰찾기</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="game-panel" aria-labelledby="game-title">
        <header class="topbar">
          <div>
            <p class="eyebrow">9x9 · 지뢰 10개</p>
            <h1 id="game-title">지뢰찾기</h1>
          </div>
          <button class="icon-button" id="new-game" type="button" aria-label="새 게임" title="새 게임">
            ↻
          </button>
        </header>

        <div class="status-strip" aria-live="polite">
          <div>
            <span class="label">상태</span>
            <strong id="game-status">첫 칸을 열어주세요</strong>
          </div>
          <div>
            <span class="label">남은 깃발</span>
            <strong id="flags-left">10</strong>
          </div>
          <div>
            <span class="label">시간</span>
            <strong><span id="timer">0</span>초</strong>
          </div>
        </div>

        <div class="board-wrap">
          <div
            class="board"
            id="board"
            role="grid"
            aria-label="지뢰찾기 9x9 보드"
          ></div>
        </div>
      </section>

      <aside class="side-panel">
        <section>
          <h2>TOP 10 기록</h2>
          <ol class="records" id="records">
            <li class="muted">아직 기록이 없습니다.</li>
          </ol>
        </section>
        <section class="firebase-state">
          <h2>저장소</h2>
          <p id="firebase-status">브라우저에 임시 저장 중</p>
        </section>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
